server {
    listen 8088;
    charset     utf8;
    access_log /app/www/librarysite/logs/librarysite_acces.log;
    error_log /app/www/librarysite/logs/librarysite_error.log error;
        location / {
            proxy_pass http://librarysite:8000;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_redirect off;
        }
        location /favicon.ico {access_log off; log_not_found off; }
        location /static {root /app/www/librarysite/;}
        location /media {root /app/www/librarysite/;}

}